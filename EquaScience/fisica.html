<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="png" sizes="16x16" href="img/EquaScience.png">
    <link rel="stylesheet" type="text/css" href="css/style.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <title>EquaScience</title>
</head>
<body>
    <header class="container-fluid" id="all">
        <div class="row py-4">
            <div class="col-sm-8 col-xs-4 py-2">
                <a href="index.html">
                    <img src="img/EquaScience.png" class="imglogo" alt="">
                </a>
            </div>
            <div class="col-sm-4 col-xs-4 py-2" id="home">
                <ul class="nav nav-underline">
                    <li class="nav-item">
                        <a id="select" class="nav-link" aria-current="page" href="index.html">Início</a>
                    </li>
                    <li class="nav-item">
                        <a id="nava" class="nav-link active" href="fisica.html">Física</a>
                    </li>
                    <li class="nav-item">
                        <a id="nava" class="nav-link" href="eletro.html">Eletrônica</a>
                    </li>
                    <li class="nav-item">
                        <a id="nava" class="nav-link" href="mec.html">Mecânica</a>
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <div class="container" id="dark-card2">
        <h1 id="titlo">Fórmulas da Física</h1>
        <div class="container">
            <div class="row">
                <div class="col-xs-6">
                    <p id="par">Grandezas Básicas</p>
                    <input type="text" id="vm" name="vm" placeholder="Vm (m/s)"/>
                    <input type="text" id="deltaX" name="deltaX" placeholder="Δx (m)"/>
                    <input type="text" id="deltaT" name="deltaT" placeholder="Δt (s)"/>
                    <button type="button" onclick="calcularGrandezas()">Calcular Grandezas Básicas</button>
                    <p id="resultado"></p>
                </div>
                <div class="col-xs-6">
                    <p id="par">MRUV</p>
                    <input type="text" id="vmruv" name="vmruv" placeholder="Vm (m/s)"/>
                    <input type="text" id="a" name="a" placeholder="a (m/s²)"/>
                    <input type="text" id="deltaXmruv" name="deltaXmruv" placeholder="Δx (m)"/>
                    <input type="text" id="deltaTmruv" name="deltaTmruv" placeholder="Δt (s)"/>
                    <button type="button" onclick="calcularMRUV()">Calcular MRUV</button>
                    <p id="resultadoMRUV"></p>
                </div>
                <div class="col-xs-6">
                    <p id="par">Queda Livre</p>
                    <input type="text" id="h" name="h" placeholder="Altura (h)"/>
                    <input type="text" id="t" name="t" placeholder="Tempo (t)"/>
                    <input type="text" id="g" name="g" placeholder="Gravidade (g = 9.8)" value="9.8"/>
                    <button type="button" onclick="calcularQuedaLivre()">Calcular Queda Livre</button>
                    <p id="resultadoQuedaLivre"></p>
                </div>
                <div class="col-xs-6">
                    <h1 id="par">Cálculo da Força (F = m × a)</h1>
            
                    <label for="massa">Massa (m):</label>
                    <input type="number" id="massa" placeholder="kg">
            
                    <label for="aceleracao">Aceleração (a):</label>
                    <input type="number" id="aceleracao" placeholder="m/s²">
            
                    <button onclick="calcularForca()">Calcular Força</button>
            
                    <p id="resultado-mecanica"></p>
                </div>
                <div class="col-xs-6">
                    <p id="par">Cálculo da Tensão (V = I × R)</p>

                    <label for="corrente">Corrente (I):</label>
                    <input type="number" id="corrente" placeholder="A">

                    <label for="resistencia">Resistência (R):</label>
                    <input type="number" id="resistencia" placeholder="Ω">

                    <button onclick="calcularTensao()">Calcular Tensão</button>

                    <p id="resultado-eletronica"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
</body>
</html>
